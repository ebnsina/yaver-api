openapi: 3.1.0
info:
  title: Yaver API
  version: 0.1.0
  description: |
    Public API for Yaver. Session-cookie auth for the dashboard; API keys for
    server-to-server ingest. This spec is the source of truth for generated
    clients (yaver-web) and partner SDKs.
servers:
  - url: /
paths:
  /v1/auth/otp/request:
    post:
      operationId: requestOtp
      summary: Request a login OTP for a phone number
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: Code sent (dev_code present only in dev)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestResult'
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/auth/register:
    post:
      operationId: register
      summary: Create an email/password account and sign in
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        '200':
          description: Signed in (sets the session cookie)
          content:
            application/json:
              schema: { type: object, properties: { user_id: { type: string }, email: { type: string } } }
        '400': { description: Email and an 8+ character password are required }
        '409': { description: Email already registered }

  /v1/auth/login:
    post:
      operationId: login
      summary: Sign in with email/password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Signed in (sets the session cookie)
          content:
            application/json:
              schema: { type: object, properties: { user_id: { type: string }, email: { type: string } } }
        '401': { description: Invalid email or password }

  /v1/auth/otp/verify:
    post:
      operationId: verifyOtp
      summary: Verify an OTP and start a session (sets an httpOnly cookie)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerify'
      responses:
        '200':
          description: Verified; session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      tags: [auth]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'

  /v1/me:
    get:
      operationId: getMe
      summary: The authenticated user
      tags: [auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/calls:
    get:
      operationId: listCalls
      summary: Recent calls for the authenticated org
      tags: [calls]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Calls, newest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/calls/{id}:
    get:
      operationId: getCall
      summary: A single call (org-scoped)
      tags: [calls]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Call detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/settings/call-policy:
    get:
      operationId: getCallPolicy
      summary: The org's calling window + retry policy
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Call policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallPolicy'
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      operationId: saveCallPolicy
      summary: Update the calling window + retry policy
      tags: [settings]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallPolicy'
      responses:
        '200': { description: Saved }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/chat/messages:
    post:
      operationId: sendChatMessage
      summary: Send a message and get the assistant's reply
      tags: [chat]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                conversation_id: { type: string, description: Omit to start a new conversation }
                text: { type: string }
      responses:
        '200':
          description: Reply
          content:
            application/json:
              schema:
                type: object
                required: [conversation_id, reply]
                properties:
                  conversation_id: { type: string }
                  reply: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/channels:
    get:
      operationId: listChannels
      summary: Connected messaging channels (WhatsApp / Messenger)
      tags: [channels]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelList'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: connectChannel
      summary: Connect a WhatsApp or Messenger channel
      tags: [channels]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, external_id, access_token, verify_token]
              properties:
                type: { type: string, enum: [whatsapp, messenger] }
                external_id: { type: string, description: WhatsApp phone_number_id or Messenger page_id }
                access_token: { type: string }
                verify_token: { type: string }
      responses:
        '200':
          description: Connected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/channels/{type}:
    delete:
      operationId: disconnectChannel
      summary: Disconnect a channel
      tags: [channels]
      security:
        - cookieAuth: []
      parameters:
        - { name: type, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Disconnected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/chat/settings:
    get:
      operationId: getChatSettings
      summary: Chat/widget settings
      tags: [chat]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSettings'
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      operationId: saveChatSettings
      summary: Update chat/widget settings
      tags: [chat]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSettings'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/chat/conversations:
    get:
      operationId: listConversations
      summary: The org's chat conversations
      tags: [chat]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/chat/conversations/{id}:
    get:
      operationId: getConversation
      summary: A conversation's messages
      tags: [chat]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageList'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/chat/conversations/{id}/summarize:
    post:
      operationId: summarizeConversation
      summary: Generate (or refresh) the AI insight for a conversation
      description: >
        Distills the transcript into a summary, outcome, sentiment, and suggested
        next action. Provider-agnostic; the result is cached and returned on the
        conversation detail. Re-running overwrites the prior insight.
      tags: [chat]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: The generated insight
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationInsight'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/chat/conversations/{id}/status:
    put:
      operationId: setConversationStatus
      summary: Transition a conversation (open | handling | closed)
      description: >
        Setting "handling" hands the thread to a human — the assistant stops
        auto-replying so it doesn't talk over the agent. "open" returns it to
        the bot; "closed" ends it.
      tags: [chat]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, handling, closed] }
      responses:
        '200': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/chat/conversations/{id}/reply:
    post:
      operationId: agentReply
      summary: Post a human agent's reply (takes the conversation over)
      description: >
        Records the agent's message (role "agent"), marks the conversation
        "handling", and delivers the reply out over the messaging channel
        (WhatsApp/Messenger). Web-widget threads have no external transport.
      tags: [chat]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        '200':
          description: Stored (and delivered when the channel supports it)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  delivered: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/campaigns:
    get:
      operationId: listCampaigns
      summary: The org's campaigns
      tags: [campaigns]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignList'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createCampaign
      summary: Create a draft campaign
      tags: [campaigns]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { type: object, required: [id], properties: { id: { type: string } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/campaigns/{id}/recipients:
    post:
      operationId: importCampaignRecipients
      summary: Import a recipient list from CSV (phone[,name] per row)
      description: >
        Rows with an invalid phone (including a header row) are skipped; phones
        are normalized and deduped. A campaign with recipients dials that list;
        one with none falls back to all callable customers.
      tags: [campaigns]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          text/csv:
            schema: { type: string, example: "01711223344,Rahim\n01812345678,Karim" }
      responses:
        '200':
          description: Imported
          content:
            application/json:
              schema: { type: object, required: [added], properties: { added: { type: integer } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/campaigns/{id}/schedule:
    post:
      operationId: scheduleCampaign
      summary: Schedule a draft campaign to auto-start at a future time
      tags: [campaigns]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [at]
              properties:
                at: { type: string, format: date-time, description: 'RFC3339, must be in the future' }
      responses:
        '200':
          description: Scheduled
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string }, at: { type: string, format: date-time } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/campaigns/{id}/start:
    post:
      operationId: startCampaign
      summary: Dispatch the campaign now (recipients, or all callable customers)
      tags: [campaigns]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Dispatched
          content:
            application/json:
              schema: { type: object, required: [queued], properties: { queued: { type: integer } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/customers:
    get:
      operationId: listCustomers
      summary: The org's customers
      tags: [customers]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/customers/{id}/dnd:
    post:
      operationId: setDnd
      summary: Put a customer on do-not-disturb (skip calls)
      tags: [customers]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: DND set
          content:
            application/json:
              schema: { type: object, properties: { dnd: { type: boolean } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      operationId: clearDnd
      summary: Remove a customer from do-not-disturb
      tags: [customers]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: DND cleared
          content:
            application/json:
              schema: { type: object, properties: { dnd: { type: boolean } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/flows:
    get:
      operationId: listFlows
      summary: The org's flows
      tags: [flows]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Flows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowList'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createFlow
      summary: Create a flow (no-code builder / templates)
      description: >
        Names are unique per org among active flows, so ingest can route an event
        type to a flow by name (e.g. cart_abandoned → cart_recovery).
      tags: [flows]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string, example: cart_recovery }
                type: { type: string, enum: [ivr, chat], default: ivr }
                channel: { type: string, enum: [voice, chat] }
                locale: { type: string, default: en }
                spec: { type: object, additionalProperties: true, description: 'IVR keypad spec (required for type=ivr)' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: A flow with that name already exists }

  /v1/flows/templates:
    get:
      operationId: listFlowTemplates
      summary: Built-in starter flows the no-code builder can clone
      tags: [flows]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: object
                required: [templates]
                properties:
                  templates:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        title: { type: string }
                        description: { type: string }
                        channel: { type: string }
                        type: { type: string }
                        locale: { type: string }
                        spec: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/flows/simulate:
    post:
      operationId: simulateFlow
      summary: Dry-run an IVR spec against keypad inputs (in-browser simulator)
      description: >
        Runs the deterministic IVR engine over a spec and a sequence of inputs
        (each a digit or the literal "timeout"), returning every step and the
        terminal outcome. No telephony, credits, or persistence.
      tags: [flows]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec: { type: object, additionalProperties: true }
                inputs:
                  type: array
                  items: { type: string, description: 'a digit "1".."9" or "timeout"' }
      responses:
        '200':
          description: Simulation trace + outcome
          content:
            application/json:
              schema:
                type: object
                required: [steps, ended]
                properties:
                  ended: { type: boolean }
                  result: { type: string }
                  status: { type: string }
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        node: { type: string }
                        kind: { type: string, enum: [say, say_gather, hangup] }
                        awaits_input: { type: boolean }
                        say: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/flows/{id}:
    get:
      operationId: getFlow
      summary: A flow with its spec (for the builder)
      tags: [flows]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Flow detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }
    put:
      operationId: updateFlow
      summary: Replace a flow's spec
      tags: [flows]
      security:
        - cookieAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/billing:
    get:
      operationId: getBilling
      summary: Credit balance and recent ledger
      tags: [billing]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Billing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Billing'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/billing/topup:
    post:
      operationId: topUpCredits
      summary: Add credits directly (dev-only mock — 403 in prod)
      description: >
        Instant credit grant with no payment, gated to non-prod for testing.
        In production use /v1/billing/checkout instead.
      tags: [billing]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer }
      responses:
        '200':
          description: New balance
          content:
            application/json:
              schema: { type: object, required: [balance], properties: { balance: { type: integer } } }
        '403': { description: Not available outside dev }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/billing/checkout:
    post:
      operationId: checkoutCredits
      summary: Start a credit purchase and get the gateway redirect URL
      description: >
        Records a pending payment and opens a hosted checkout on the configured
        gateway (SSLCommerz in prod, mock in dev). Credits are granted only when
        the gateway confirms the charge via IPN at /webhooks/payment.
      tags: [billing]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                credits: { type: integer }
      responses:
        '200':
          description: Redirect the customer here to pay.
          content:
            application/json:
              schema: { type: object, required: [redirect_url], properties: { redirect_url: { type: string } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '502': { description: Gateway could not start the payment }

  /webhooks/payment:
    post:
      operationId: paymentIPN
      summary: Payment gateway IPN callback (public, gateway-authenticated)
      description: >
        Instant Payment Notification from the gateway. The handler authenticates
        the callback with the gateway (SSLCommerz validation API) before granting
        credits, and always acks 200 so the gateway does not retry.
      tags: [billing]
      responses:
        '200': { description: Acknowledged }

  /v1/analytics/summary:
    get:
      operationId: getSummary
      summary: Dashboard metrics rollup
      tags: [analytics]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Summary'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/analytics/overview:
    get:
      operationId: getAnalyticsOverview
      summary: Cross-channel dashboard rollup (calls, conversations, credits)
      tags: [analytics]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsOverview'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/activity/stream:
    get:
      operationId: streamActivity
      summary: Live activity feed (Server-Sent Events)
      description: >
        A long-lived Server-Sent Events stream of the org's live activity —
        calls completing, chat messages arriving. Each event is a default SSE
        `message` frame whose JSON `data` carries `{ type, title, detail, at }`
        (`type` discriminates the kind, e.g. `call.completed`, `chat.message`).
        The server also sends `: ping` comments as heartbeats. Subscribe with the
        browser EventSource API.
      tags: [analytics]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: An event stream.
          content:
            text/event-stream:
              schema:
                type: string
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/onboarding/ask:
    post:
      operationId: onboardingAsk
      summary: Ask the AI setup assistant a question
      description: >
        Runs the configured chat model with a setup-aware system prompt. The
        client sends its known setup progress so the answer references what's
        left to do.
      tags: [analytics]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: { type: string }
                progress:
                  type: object
                  properties:
                    store_named: { type: boolean }
                    has_api_key: { type: boolean }
                    webhook_set: { type: boolean }
                    has_flow: { type: boolean }
      responses:
        '200':
          description: Assistant answer
          content:
            application/json:
              schema: { type: object, required: [answer], properties: { answer: { type: string } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/reports/ask:
    post:
      operationId: askReport
      summary: Ask a natural-language question over your metrics (AI custom reports)
      description: >
        Provider-agnostic. Returns a plain-language answer grounded in the org's
        current call, conversation, and credit metrics, plus the underlying data.
      tags: [analytics]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: { type: string, example: 'which channel recovered the most this week?' }
      responses:
        '200':
          description: Answer
          content:
            application/json:
              schema:
                type: object
                required: [answer, data]
                properties:
                  answer: { type: string }
                  data: { $ref: '#/components/schemas/AnalyticsOverview' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dev/test-call:
    post:
      operationId: testCall
      summary: Simulate a call with a keypress (no telephony) — generates an outcome
      tags: [calls]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestCallRequest'
      responses:
        '200':
          description: Simulated call outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCallResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/settings/org:
    put:
      operationId: renameOrg
      summary: Rename the org (store) shown in the dashboard
      tags: [settings]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Renamed
          content:
            application/json:
              schema:
                type: object
                required: [name]
                properties:
                  name: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/settings/publishable-key:
    post:
      operationId: createPublishableKey
      summary: Mint a publishable (yvr_pk_) key for the embeddable widget
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Publishable key (shown once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResult'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/settings/api-keys:
    get:
      operationId: listApiKeys
      summary: List the org's API keys (metadata only)
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyList'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createApiKey
      summary: Create an API key for the org (returned once)
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The new key (store it now — not retrievable later)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResult'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/settings/webhook:
    get:
      operationId: getWebhook
      summary: Current webhook config (no secret)
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Webhook config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfig'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: setWebhook
      summary: Set the webhook URL; returns a fresh signing secret once
      tags: [settings]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSet'
      responses:
        '200':
          description: Saved; signing secret (store it now)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSecret'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/events:
    post:
      operationId: ingestEvent
      summary: Ingest a merchant store event (routes to the matching flow)
      tags: [ingest]
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '200':
          description: Duplicate (idempotent no-op)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: yaver_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    Status:
      type: object
      required: [status]
      properties:
        status: { type: string }
    OtpRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, example: '01712345678' }
    OtpRequestResult:
      type: object
      required: [status]
      properties:
        status: { type: string }
        dev_code:
          type: string
          description: Present only in dev (no SMS provider yet)
    OtpVerify:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string }
        code: { type: string }
    SessionUser:
      type: object
      required: [user_id, phone]
      properties:
        user_id: { type: string }
        phone: { type: string }
    Me:
      type: object
      required: [user_id, phone, email, name, org]
      properties:
        user_id: { type: string }
        phone: { type: string }
        email: { type: string }
        name: { type: string }
        org:
          type: object
          required: [id, name]
          properties:
            id: { type: string }
            name: { type: string }
    Summary:
      type: object
      required: [total, confirmed, cancelled, today, confirmation_rate]
      properties:
        total: { type: integer }
        confirmed: { type: integer }
        cancelled: { type: integer }
        today: { type: integer }
        confirmation_rate: { type: integer, description: percent 0-100 }
    AnalyticsOverview:
      type: object
      required: [calls, conversations, credits]
      properties:
        calls:
          type: object
          required: [total, confirmed, cancelled, today, confirmation_rate]
          properties:
            total: { type: integer }
            confirmed: { type: integer }
            cancelled: { type: integer }
            today: { type: integer }
            confirmation_rate: { type: integer, description: percent 0-100 }
        conversations:
          type: object
          required: [total, today, resolved, pending, sale, needs_human, resolution_rate]
          properties:
            total: { type: integer }
            today: { type: integer }
            resolved: { type: integer }
            pending: { type: integer }
            sale: { type: integer }
            needs_human: { type: integer }
            resolution_rate: { type: integer, description: percent 0-100 }
        credits:
          type: object
          required: [balance, spent_today, spent_30d]
          properties:
            balance: { type: integer }
            spent_today: { type: integer }
            spent_30d: { type: integer }
    CallPolicy:
      type: object
      required: [window_start, window_end, timezone, max_retries]
      properties:
        window_start: { type: integer, description: 'local hour calls may start, inclusive (0-23)' }
        window_end: { type: integer, description: 'local hour calls must stop, exclusive (1-24)' }
        timezone: { type: string, example: 'Asia/Dhaka' }
        max_retries: { type: integer, description: 'retry attempts for a failed call (0-10)' }
    TestCallRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string }
        digit: { type: string, description: 'simulated keypress: 1|2|3' }
    TestCallResult:
      type: object
      required: [call_id, status, result]
      properties:
        call_id: { type: string }
        status: { type: string }
        result: { type: string }
    ApiKeyResult:
      type: object
      required: [api_key]
      properties:
        api_key: { type: string }
    ApiKeyInfo:
      type: object
      required: [prefix, name, kind, created_at]
      properties:
        prefix: { type: string }
        name: { type: string }
        kind: { type: string, enum: [secret, publishable] }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
    ApiKeyList:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items: { $ref: '#/components/schemas/ApiKeyInfo' }
    WebhookConfig:
      type: object
      required: [configured, events]
      properties:
        configured: { type: boolean }
        url: { type: string }
        events:
          type: array
          items: { type: string }
    WebhookSet:
      type: object
      required: [url]
      properties:
        url: { type: string }
        events:
          type: array
          items: { type: string }
    WebhookSecret:
      type: object
      required: [secret]
      properties:
        secret: { type: string }
    LedgerEntry:
      type: object
      required: [delta, reason, created_at]
      properties:
        delta: { type: integer }
        reason: { type: string }
        created_at: { type: string, format: date-time }
    Billing:
      type: object
      required: [balance, ledger]
      properties:
        balance: { type: integer }
        ledger:
          type: array
          items: { $ref: '#/components/schemas/LedgerEntry' }
    Channel:
      type: object
      required: [type, external_id, created_at]
      properties:
        type: { type: string }
        external_id: { type: string }
        created_at: { type: string, format: date-time }
    ChannelList:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items: { $ref: '#/components/schemas/Channel' }
    ChatSettings:
      type: object
      required: [instructions, widget_title, welcome, accent]
      properties:
        instructions: { type: string }
        widget_title: { type: string }
        welcome: { type: string }
        accent: { type: string }
    Conversation:
      type: object
      required: [id, channel, customer, status, last_message, message_count, updated_at]
      properties:
        id: { type: string }
        channel: { type: string }
        customer: { type: string }
        status: { type: string }
        last_message: { type: string }
        message_count: { type: integer }
        updated_at: { type: string, format: date-time }
    ConversationList:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
    ChatMessage:
      type: object
      required: [role, content, created_at]
      properties:
        role: { type: string, enum: [user, assistant, agent, system] }
        content: { type: string }
        created_at: { type: string, format: date-time }
    MessageList:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: '#/components/schemas/ChatMessage' }
        insight:
          allOf:
            - $ref: '#/components/schemas/ConversationInsight'
          nullable: true
          description: The cached AI insight, present once one has been generated.
    ConversationInsight:
      type: object
      required: [summary, outcome, sentiment, next_action, created_at]
      properties:
        summary: { type: string }
        outcome: { type: string, enum: [resolved, pending, sale, needs_human, unknown] }
        sentiment: { type: string, enum: [positive, neutral, negative] }
        next_action: { type: string }
        created_at: { type: string, format: date-time }
    Campaign:
      type: object
      required: [id, name, status, target_count, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [draft, scheduled, completed] }
        target_count: { type: integer }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        scheduled_at: { type: string, format: date-time, nullable: true }
    CampaignList:
      type: object
      required: [campaigns]
      properties:
        campaigns:
          type: array
          items: { $ref: '#/components/schemas/Campaign' }
    Customer:
      type: object
      required: [id, phone, name, dnd, created_at]
      properties:
        id: { type: string }
        phone: { type: string }
        name: { type: string }
        dnd: { type: boolean }
        created_at: { type: string, format: date-time }
    CustomerList:
      type: object
      required: [customers]
      properties:
        customers:
          type: array
          items: { $ref: '#/components/schemas/Customer' }
    FlowSummary:
      type: object
      required: [id, name, version, channel, type, active]
      properties:
        id: { type: string }
        name: { type: string }
        version: { type: integer }
        channel: { type: string }
        type: { type: string }
        active: { type: boolean }
    FlowList:
      type: object
      required: [flows]
      properties:
        flows:
          type: array
          items: { $ref: '#/components/schemas/FlowSummary' }
    FlowDetail:
      type: object
      required: [id, name, version, channel, type, locale, spec]
      properties:
        id: { type: string }
        name: { type: string }
        version: { type: integer }
        channel: { type: string }
        type: { type: string }
        locale: { type: string }
        spec: { type: object, additionalProperties: true }
    Call:
      type: object
      required: [id, direction, status, result, created_at]
      properties:
        id: { type: string }
        direction: { type: string, enum: [inbound, outbound] }
        status:
          type: string
          enum: [queued, ringing, in_progress, completed, failed, no_answer]
        result: { type: string }
        created_at: { type: string, format: date-time }
    CallList:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items: { $ref: '#/components/schemas/Call' }
    CallDetail:
      type: object
      required: [id, direction, status, result, flow_id, provider_call_id, created_at]
      properties:
        id: { type: string }
        direction: { type: string }
        status: { type: string }
        result: { type: string }
        flow_id: { type: string }
        provider_call_id: { type: string }
        created_at: { type: string, format: date-time }
    EventRequest:
      type: object
      required: [event_type, event_id]
      properties:
        event_type:
          type: string
          description: >
            Routed to a flow by name: order_placed→order_confirm,
            abandoned_cart→cart_recovery, out_for_delivery→delivery_reminder.
            Other types are stored but trigger no call.
          enum: [order_placed, order_cancelled, abandoned_cart, out_for_delivery]
        event_id: { type: string, description: Merchant-side unique id (idempotency) }
        customer:
          type: object
          properties:
            phone: { type: string }
    EventAccepted:
      type: object
      required: [status, event_id]
      properties:
        status: { type: string }
        event_id: { type: string }
