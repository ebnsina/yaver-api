openapi: 3.1.0
info:
  title: Yaver API
  version: 0.1.0
  description: |
    Public API for Yaver. Session-cookie auth for the dashboard; API keys for
    server-to-server ingest. This spec is the source of truth for generated
    clients (yaver-web) and partner SDKs.
servers:
  - url: /
paths:
  /v1/auth/otp/request:
    post:
      operationId: requestOtp
      summary: Request a login OTP for a phone number
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: Code sent (dev_code present only in dev)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestResult'
        '400': { $ref: '#/components/responses/BadRequest' }

  /v1/auth/otp/verify:
    post:
      operationId: verifyOtp
      summary: Verify an OTP and start a session (sets an httpOnly cookie)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerify'
      responses:
        '200':
          description: Verified; session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      tags: [auth]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'

  /v1/me:
    get:
      operationId: getMe
      summary: The authenticated user
      tags: [auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/calls:
    get:
      operationId: listCalls
      summary: Recent calls for the authenticated org
      tags: [calls]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Calls, newest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/calls/{id}:
    get:
      operationId: getCall
      summary: A single call (org-scoped)
      tags: [calls]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Call detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/BadRequest' }

  /v1/analytics/summary:
    get:
      operationId: getSummary
      summary: Dashboard metrics rollup
      tags: [analytics]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Summary'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dev/test-call:
    post:
      operationId: testCall
      summary: Simulate a call with a keypress (no telephony) — generates an outcome
      tags: [calls]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestCallRequest'
      responses:
        '200':
          description: Simulated call outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCallResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/settings/api-keys:
    post:
      operationId: createApiKey
      summary: Create an API key for the org (returned once)
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: The new key (store it now — not retrievable later)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResult'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/settings/webhook:
    get:
      operationId: getWebhook
      summary: Current webhook config (no secret)
      tags: [settings]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Webhook config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfig'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: setWebhook
      summary: Set the webhook URL; returns a fresh signing secret once
      tags: [settings]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSet'
      responses:
        '200':
          description: Saved; signing secret (store it now)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSecret'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/events:
    post:
      operationId: ingestEvent
      summary: Ingest a merchant store event (triggers a call for order_placed)
      tags: [ingest]
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '200':
          description: Duplicate (idempotent no-op)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: yaver_session
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    Status:
      type: object
      required: [status]
      properties:
        status: { type: string }
    OtpRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, example: '01712345678' }
    OtpRequestResult:
      type: object
      required: [status]
      properties:
        status: { type: string }
        dev_code:
          type: string
          description: Present only in dev (no SMS provider yet)
    OtpVerify:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string }
        code: { type: string }
    SessionUser:
      type: object
      required: [user_id, phone]
      properties:
        user_id: { type: string }
        phone: { type: string }
    Me:
      type: object
      required: [user_id, phone, email, name]
      properties:
        user_id: { type: string }
        phone: { type: string }
        email: { type: string }
        name: { type: string }
    Summary:
      type: object
      required: [total, confirmed, cancelled, today, confirmation_rate]
      properties:
        total: { type: integer }
        confirmed: { type: integer }
        cancelled: { type: integer }
        today: { type: integer }
        confirmation_rate: { type: integer, description: percent 0-100 }
    TestCallRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string }
        digit: { type: string, description: 'simulated keypress: 1|2|3' }
    TestCallResult:
      type: object
      required: [call_id, status, result]
      properties:
        call_id: { type: string }
        status: { type: string }
        result: { type: string }
    ApiKeyResult:
      type: object
      required: [api_key]
      properties:
        api_key: { type: string }
    WebhookConfig:
      type: object
      required: [configured, events]
      properties:
        configured: { type: boolean }
        url: { type: string }
        events:
          type: array
          items: { type: string }
    WebhookSet:
      type: object
      required: [url]
      properties:
        url: { type: string }
        events:
          type: array
          items: { type: string }
    WebhookSecret:
      type: object
      required: [secret]
      properties:
        secret: { type: string }
    Call:
      type: object
      required: [id, direction, status, result, created_at]
      properties:
        id: { type: string }
        direction: { type: string, enum: [inbound, outbound] }
        status:
          type: string
          enum: [queued, ringing, in_progress, completed, failed, no_answer]
        result: { type: string }
        created_at: { type: string, format: date-time }
    CallList:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items: { $ref: '#/components/schemas/Call' }
    CallDetail:
      type: object
      required: [id, direction, status, result, flow_id, provider_call_id, created_at]
      properties:
        id: { type: string }
        direction: { type: string }
        status: { type: string }
        result: { type: string }
        flow_id: { type: string }
        provider_call_id: { type: string }
        created_at: { type: string, format: date-time }
    EventRequest:
      type: object
      required: [event_type, event_id]
      properties:
        event_type:
          type: string
          enum: [order_placed, order_cancelled, abandoned_cart]
        event_id: { type: string, description: Merchant-side unique id (idempotency) }
        customer:
          type: object
          properties:
            phone: { type: string }
    EventAccepted:
      type: object
      required: [status, event_id]
      properties:
        status: { type: string }
        event_id: { type: string }
