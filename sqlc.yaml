version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/adapter/postgres/queries"
    gen:
      go:
        package: "gen"
        out: "internal/adapter/postgres/gen"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
